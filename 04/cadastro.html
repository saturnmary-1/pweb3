<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h1>Formulários</h1>

    <form action="https://qfqdkj.hospedagemelastica.com.br/pweb/salvar.jsp" method="POST">

        Login*:<br>
        <input type="text" required name="login"><br>

        Senha:<br>
        <input type="password" name="senha"><br>
        Confirmar senha:<br>
        <input type="password" name="confirmarsenha"><br>

        Nome:<br>
        <input type="text" name="nome"><br>

        Sexo:<br>
        <input type="radio" value="Masculino" name="sexo">Masculino<br>
        <input type="radio" value="Feminino" name="sexo">Feminino<br>

        Email:<br>
        <input type="Email" name="email"><br><br>

        Interesses:<br>
        <input type="checkbox" value="Futebol" name="interesses">Futebol<br>
        <input type="checkbox" value="Politica" name="interesses">Politica<br>
        <input type="checkbox" value="Economia" name="interesses">Economia<br>
        <input type="checkbox" value="Carros" name="interesses">Carros<br>
        <input type="checkbox" value="Celebridades" name="interesses">Celebridades<br>

        <label for="estado">Escolha um estado:</label>
        <select name="estado" id="estado">
            <option value="MA">MA</option>
            <option value="SP">SP</option>
            <option value="BH">BH</option>
            <option value="PI">PI</option>
            <option value="AM">MG</option>
        </select>
        <br><br>
        <p><label for="Observações">Observações:</label></p>
        <textarea name="Observacao" rows="4" cols="50"></textarea>
        <br>
        <input type="submit" value="Enviar">


        <br><br>
    
    </form>
</body>
</html>
